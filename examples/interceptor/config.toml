[component.greeter]
uri = "./target/wasm32-unknown-unknown/release/greeter.wasm"
interceptors = ["logger"]

[component.logger]
uri = "./logger.wasm"
imports = ["clocks", "io", "stdio"]

[capability.clocks]
uri = "wasmtime:wasip2"

[capability.io]
uri = "wasmtime:io"

[capability.stdio]
uri = "wasmtime:inherit-stdio"
