[component.greeter]
uri = "./lib/greeter.wasm"
interceptors = ["logging-advice"]

[component.logging-advice]
uri = "./lib/logger.wasm"
imports = ["stdout-logger"]

[component.stdout-logger]
uri = "./lib/wasi-logging-to-stdout.wasm"
# could use this instead of pulling in the build script:
# uri = "oci://ghcr.io/componentized/logging/to-stdout:v0.2.1"
imports = ["wasip2"]

[capability.wasip2]
type = "wasi:p2"
