[component.guest]
uri = "./lib/guest.wasm"
imports = ["otel"]

[component.otel]
uri = "./lib/otel-to-grpc.wasm"
imports = ["grpc", "wasip2"]

[capability.grpc]
type = "grpc"
url = "http://localhost:4317"
paths.logs = "/opentelemetry.proto.collector.logs.v1.LogsService/Export"
paths.traces = "/opentelemetry.proto.collector.trace.v1.TraceService/Export"

[capability.wasip2]
type = "wasi:p2"
